name: Analyze

# Phase-5 dossier on demand: /analyze <TICKER> in Telegram → the Vercel webhook fires
# this workflow_dispatch (bot/handlers.handle_analyze), mirroring the /pulse pattern —
# heavy work lives here, never in the webhook (blueprint §3). One step runs the whole
# chain: frozen data pack → deterministic valuation → synthesis → BOTH gates (Law-1
# lint + numeric grounding) → store to `analyses` → Telegram delivery (plain text,
# split at 4096). A gate failure aborts BEFORE store/send and lands in fetch_log
# (analyst:law1 / analyst:grounding); the alert tail then puts the red run in
# Telegram too (Law 7).
on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Ticker to analyze (e.g. TSLA)'
        required: true
        default: 'TSLA'
      length:
        description: "Delivery length: 'brief', 'full', or '' to use config.dossier_length"
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    # Repo secrets consumed by the analyst modules below (uniform across jobs).
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
      ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
      IBKR_FLEX_QUERY_ID: ${{ secrets.IBKR_FLEX_QUERY_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: pip install -r requirements-jobs.txt
      # The ticker rides in an env var and is quoted — NEVER interpolated into the
      # shell line. A workflow_dispatch input is user input (the webhook shape-gates
      # it, but this workflow can also be dispatched by hand): env-var passing keeps
      # a hostile string inert instead of becoming shell syntax.
      # LENGTH is passed as --length only when non-empty; empty => the dossier resolves
      # config.dossier_length in-job (§3). Both ride in quoted env vars, never
      # interpolated into the shell line (a workflow_dispatch input is user input).
      - run: python -m analyst.dossier "$TICKER" --send ${LENGTH:+--length "$LENGTH"}
        env:
          TICKER: ${{ github.event.inputs.ticker }}
          LENGTH: ${{ github.event.inputs.length }}
      # Fail-loud push (Law 7 / §12): a red dossier run must reach Telegram, not just
      # a GitHub e-mail — especially a gate rejection, which is a designed outcome.
      - name: Telegram alert on failure
        if: failure()
        run: python -m bot.job_alert "Analyze"
