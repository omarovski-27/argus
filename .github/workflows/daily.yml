name: Daily Data

# Weekday 20:30 UTC: IBKR Flex + Tiingo prices + locally computed indicators
# (blueprint §3 / §6). Trade detection / round-trip pairing arrives in Phase 2.
on:
  # schedule disabled until the pipeline runs end-to-end; scheduled runs only
  # fail downstream of pip right now (red mail, zero signal). Re-enable at deploy.
  # schedule:
  #   - cron: '30 20 * * 1-5'     # 20:30 UTC, Mon-Fri
  workflow_dispatch:             # manual trigger kept for testing

jobs:
  run:
    runs-on: ubuntu-latest
    # Repo secrets consumed by the ingestion modules below (uniform across jobs).
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
      ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
      IBKR_FLEX_QUERY_ID: ${{ secrets.IBKR_FLEX_QUERY_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r requirements.txt
      - run: python -m ingestion.tiingo
      - run: python -m ingestion.ibkr_flex
      - run: python -m ingestion.indicators
